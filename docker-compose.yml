services:
  campmate:
    build: .
    container_name: campmate
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - campmate_data:/data
      # Optionally mount trusted mkcert certs to skip the browser warning:
      # - ./certs:/app/certs:ro
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production

volumes:
  campmate_data:
